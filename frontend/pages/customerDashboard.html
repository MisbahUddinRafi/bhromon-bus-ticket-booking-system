<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Bhromon</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    body {
      padding: 24px;
      padding-top: 80px;
      background: var(--pale-sage);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(82, 121, 111, 0.06) 0%, transparent 50%);
      min-height: 100vh;
      color: var(--charcoal);
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--dark-teal), var(--charcoal));
      color: var(--pale-sage);
      padding: 20px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
      animation: slideInDown 0.5s var(--ease-out) both;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }

    header .logo {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s var(--ease-out);
      display: flex;
      align-items: center;
      gap: 10px;
      height: 50px;
      max-width: 180px;
    }

    header .logo img {
      height: 100%;
      width: auto;
      max-width: 160px;
      object-fit: contain;
      display: block;
    }

    header .logo:hover {
      opacity: 0.8;
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      header .logo {
        height: 45px;
        max-width: 160px;
        gap: 8px;
      }

      header .logo img {
        max-width: 140px;
      }
    }

    @media (max-width: 480px) {
      header .logo {
        height: 40px;
        max-width: 140px;
        gap: 6px;
      }

      header .logo img {
        max-width: 120px;
      }
    }


    .header-nav {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .nav-btn-group {
      position: relative;
      display: inline-block;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.1);
      color: var(--pale-sage);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.3s var(--ease-out);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      min-height: 40px;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .tooltip {
      position: absolute;
      bottom: -35px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(47, 62, 70, 0.95);
      color: var(--pale-sage);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-family: var(--font-body);
      font-weight: 500;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s var(--ease-out);
      z-index: 2000;
    }

    .nav-btn-group:hover .tooltip {
      opacity: 1;
    }

    .header-buttons {
      position: relative;
      z-index: 150;
    }

    header button {
      background: rgba(255, 255, 255, 0.1);
      color: var(--pale-sage);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.3s var(--ease-out);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14px;
    }

    header button:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.3);
    }

    #profileMenu {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      background: #fff;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
      z-index: 2000;
      overflow: visible;
      min-width: 200px;
      border: 1px solid rgba(82, 121, 111, 0.1);
      animation: slideInDown 0.25s var(--ease-out) both;
    }

    #profileMenu button {
      width: 100%;
      background: #fff;
      color: var(--charcoal);
      border: none;
      border-bottom: 1px solid rgba(82, 121, 111, 0.08);
      border-radius: 0;
      padding: 13px 20px;
      text-align: left;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
    }

    #profileMenu button:last-child {
      border-bottom: none;
    }

    #profileMenu button:hover {
      background: rgba(132, 169, 140, 0.08);
      color: var(--forest);
    }

    .profile-btn {
      background: rgba(255, 255, 255, 0.1);
      color: var(--pale-sage);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.3s var(--ease-out);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14px;
    }

    .profile-btn:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    /* ── Sections ── */
    section {
      background: #fff;
      padding: 28px;
      margin-bottom: 24px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(82, 121, 111, 0.08);
      box-shadow: var(--shadow-sm);
      animation: fadeInUp 0.5s var(--ease-out) both;
    }

    section:first-of-type {
      margin-top: 20px;
      scroll-margin-top: 100px;
    }

    section {
      scroll-margin-top: 100px;
    }

    section:nth-child(3) {
      animation-delay: 0.1s;
    }

    h3 {
      font-family: var(--font-display);
      color: var(--charcoal);
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--sage);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Search Form ── */
    .search-group {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    select,
    input[type="date"] {
      padding: 12px 14px;
      border: 1.5px solid rgba(82, 121, 111, 0.2);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: var(--font-body);
      transition: all 0.3s var(--ease-out);
      background: #fff;
      color: var(--charcoal);
      outline: none;
    }

    select:focus,
    input[type="date"]:focus {
      border-color: var(--forest);
      box-shadow: 0 0 0 4px rgba(82, 121, 111, 0.1);
    }

    button[type="button"],
    button.search-btn {
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--forest), var(--dark-teal));
      color: var(--pale-sage);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.35s var(--ease-out);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.3px;
    }

    button[type="button"]:hover,
    button.search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(82, 121, 111, 0.35);
    }

    /* ── Recent Search Cards ── */
    #recentSearches {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .search-card {
      background: linear-gradient(135deg, var(--dark-teal), var(--forest));
      color: var(--pale-sage);
      padding: 22px;
      border-radius: var(--radius-md);
      cursor: default;
      transition: all 0.35s var(--ease-out);
      box-shadow: 0 4px 18px rgba(53, 79, 82, 0.25);
      animation: fadeInUp 0.5s var(--ease-out) both;
    }

    .search-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 35px rgba(53, 79, 82, 0.4);
    }

    .search-card h4 {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .search-card p {
      font-size: 13px;
      opacity: 0.85;
      margin: 5px 0;
    }

    .search-card button {
      background: rgba(255, 255, 255, 0.15);
      color: var(--pale-sage);
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      cursor: pointer;
      margin-top: 14px;
      width: 100%;
      transition: all 0.3s var(--ease-out);
      font-family: var(--font-display);
      font-weight: 600;
    }

    .search-card button:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.6);
      transform: scale(1.02);
    }

    .empty-message {
      text-align: center;
      color: #999;
      padding: 30px;
      font-style: italic;
    }

    @media (max-width: 768px) {
      body {
        padding: 16px;
        padding-top: 120px;
      }

      header {
        flex-direction: column;
        gap: 14px;
      }

      .search-group {
        grid-template-columns: 1fr;
      }

      #recentSearches {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
        padding-top: 140px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo" onclick="window.location.reload()">
      <img src="../../docs/bhromon_logo.png" alt="bhromon">
    </div>

    <div class="header-nav">
      <div class="nav-btn-group">
        <button class="nav-btn"
          onclick="document.querySelector('section:nth-child(2)').scrollIntoView({ behavior: 'smooth' })">📝</button>
        <div class="tooltip">Search Ticket</div>
      </div>

      <div class="nav-btn-group">
        <button class="nav-btn"
          onclick="document.querySelector('section:nth-child(3)').scrollIntoView({ behavior: 'smooth' })">📅</button>
        <div class="tooltip">Recent Searches</div>
      </div>

      <div class="nav-btn-group">
        <button class="nav-btn"
          onclick="document.querySelector('section:nth-child(4)').scrollIntoView({ behavior: 'smooth' })">📜</button>
        <div class="tooltip">Upcoming Trips</div>
      </div>

      <div class="nav-btn-group">
        <button class="nav-btn"
          onclick="document.querySelector('section:nth-child(5)').scrollIntoView({ behavior: 'smooth' })">📚</button>
        <div class="tooltip">Past Trips</div>
      </div>

      <div class="header-buttons">
        <button class="profile-btn" onclick="toggleProfile()">👤</button>
        <div id="profileMenu" style="display:none;">
          <button onclick="goToProfile()">My Profile</button>
          <button onclick="logout()">Logout</button>
        </div>
      </div>
    </div>
  </header>

  <section>
    <h3>🔍 Search Ticket</h3>
    <div class="search-group">
      <select id="fromCity"></select>
      <select id="toCity"></select>
      <input type="date" id="journeyDate">
      <button class="search-btn" onclick="searchTicket()">Search</button>
    </div>
  </section>

  <section>
    <h3>📋 Recent Searches</h3>
    <div id="recentSearches"></div>
  </section>

  <script src="../js/alerts.js"></script>
  <script src="../js/customerDashboard.js"></script>
</body>

</html>
